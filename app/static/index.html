<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Application Intelligence Tracker</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Internship Application Intelligence Tracker</h1>
      <p>Track applications, analyze job descriptions, and prioritize roles.</p>
    </div>
    <button id="refreshBtn">Refresh Applications</button>
  </header>

  <main class="layout">
    <section class="card wide">
      <div class="section-header">
        <h2>Applications</h2>
        <span id="applicationCount">0 saved</span>
      </div>
      <div id="applicationsList" class="applications-list"></div>
    </section>

    <section class="card">
      <h2>Add Application</h2>

      <form id="applicationForm" class="form">
        <label>
          Company
          <input name="company" required placeholder="Example Company" />
        </label>

        <label>
          Role
          <input name="role" required placeholder="Software Engineer Intern" />
        </label>

        <label>
          Link
          <input name="link" placeholder="https://example.com/job" />
        </label>

        <label>
          Type
          <input name="type" placeholder="SWE Intern" />
        </label>

        <label>
          Location
          <input name="location" placeholder="Remote" />
        </label>

        <label>
          Source
          <input name="source" placeholder="LinkedIn" />
        </label>

        <label>
          Status
          <select name="status">
            <option>Saved</option>
            <option>Applied</option>
            <option>OA</option>
            <option>Interview</option>
            <option>Rejected</option>
            <option>Offer</option>
            <option>No Response</option>
          </select>
        </label>

        <label>
          Deadline
          <input name="deadline" type="date" />
        </label>

        <label>
          Resume Version
          <input name="resume_version" placeholder="resume_v0" />
        </label>

        <label>
          Notes
          <textarea name="notes" rows="4" placeholder="Notes about this role"></textarea>
        </label>

        <button type="submit">Save Application</button>
      </form>
    </section>

    <section class="card">
      <h2>Job Description Analyzer</h2>

      <form id="analysisForm" class="form">
        <label>
          Job Description
          <textarea name="description" required rows="8" placeholder="Paste job description here..."></textarea>
        </label>

        <label>
          Your Skills
          <input name="user_skills" placeholder="Python, SQL, REST API, Git" />
        </label>

        <button type="submit">Analyze Description</button>
      </form>

      <pre id="analysisResult" class="result-box"></pre>
    </section>

    <section class="card wide">
      <h2>Application Intelligence Report</h2>

      <form id="reportForm" class="form report-grid">
        <label>
          Company
          <input name="company" placeholder="Demo Company" />
        </label>

        <label>
          Role
          <input name="role" placeholder="Backend Engineer Intern" />
        </label>

        <label>
          Deadline
          <input name="deadline" type="date" />
        </label>

        <label>
          Preferred Locations
          <input name="preferred_locations" placeholder="Remote, Hybrid" />
        </label>

        <label class="full">
          Job Description
          <textarea name="description" required rows="8" placeholder="Paste job description here..."></textarea>
        </label>

        <label class="full">
          Your Skills
          <input name="user_skills" placeholder="Python, SQL, REST API, FastAPI, Git" />
        </label>

        <button type="submit">Generate Report</button>
      </form>

      <div id="reportResult" class="report-result"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
